name: postdee_mobile
description: Cross-platform mobile app scaffold for PostDee.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.4
  google_sign_in: ^7.2.0
  image_picker: ^1.1.2
  in_app_purchase: ^3.3.0
  shared_preferences: ^2.5.5
  ffmpeg_kit_flutter_new_video: 2.0.0
  video_player: ^2.11.1
  firebase_messaging: ^16.4.1
  purchases_flutter: ^10.3.0
  url_launcher: ^6.3.1
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/brand/
    - assets/images/platforms/
  fonts:
    - family: Anuphan
      fonts:
        - asset: assets/fonts/anuphan/Anuphan-Regular.ttf
          weight: 400
        - asset: assets/fonts/anuphan/Anuphan-Medium.ttf
          weight: 500
        - asset: assets/fonts/anuphan/Anuphan-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/anuphan/Anuphan-Bold.ttf
          weight: 700
    - family: Prompt
      fonts:
        - asset: assets/fonts/prompt/Prompt-Regular.ttf
          weight: 400
        - asset: assets/fonts/prompt/Prompt-Medium.ttf
          weight: 500
        - asset: assets/fonts/prompt/Prompt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/prompt/Prompt-Bold.ttf
          weight: 700
        - asset: assets/fonts/prompt/Prompt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/prompt/Prompt-Black.ttf
          weight: 900
