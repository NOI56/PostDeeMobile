name: CI

on:
  pull_request:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  api:
    name: Backend API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql://postdee:postdee_password@localhost:5432/postdee?schema=public

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  mobile:
    name: Flutter Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
