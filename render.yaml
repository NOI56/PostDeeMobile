services:
  - type: web
    name: postdee-api
    runtime: node
    rootDir: apps/api
    region: singapore
    # Keep at 1 instance: PUBLISH_QUEUE=memory uses an in-process scheduler, so
    # multiple instances would each publish the same post. For >1 instance,
    # switch to PUBLISH_QUEUE=bullmq + REDIS_URL and add a separate `type: worker`
    # service running `npm run worker:publish`.
    numInstances: 1
    buildCommand: (npm install --include=dev && npm run prisma:generate && npm run build) || (cd apps/api && npm install --include=dev && npm run prisma:generate && npm run build)
    preDeployCommand: npm run prisma:migrate:deploy || (cd apps/api && npm run prisma:migrate:deploy)
    startCommand: npm run start || (cd apps/api && npm run start)
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: postdee-postgres
          property: connectionString
      - key: TEMPLATE_STORE
        value: prisma
      - key: POST_STORE
        value: prisma
      - key: SUBSCRIPTION_STORE
        value: prisma
      - key: ANALYTICS_STORE
        value: prisma
      - key: CAPTION_USAGE_STORE
        value: prisma
      - key: AI_EDIT_USAGE_STORE
        value: prisma
      - key: PUBLISH_QUEUE
        value: memory
      - key: VIDEO_STORAGE
        value: r2
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_ENDPOINT
        sync: false
      # Keep direct-to-R2 bearer upload URLs short-lived. Legacy uploads request
      # one fresh URL; multipart uploads request a fresh URL per retried part.
      - key: CLOUDFLARE_R2_UPLOAD_EXPIRES_SECONDS
        value: "300"
      # Dual mode keeps legacy app releases working while current releases opt
      # in to revocable managed multipart sessions.
      - key: UPLOAD_PROTOCOL_MODE
        value: dual
      - key: MULTIPART_UPLOAD_PART_SIZE_BYTES
        value: "16777216"
      - key: MULTIPART_UPLOAD_SESSION_EXPIRES_SECONDS
        value: "3600"
      # --- AI caption: Gemini (listens to clip; Pro also sees frames) ---
      - key: CAPTION_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      # --- Transcription + edit planning: Groq (AI auto-editing) ---
      - key: TRANSCRIPTION_PROVIDER
        value: groq
      - key: EDIT_PLAN_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      # --- Social posting: PostPeer ---
      # Per-user connected accounts are resolved from the social connection
      # store. Shared POSTPEER_*_ACCOUNT_ID values are forbidden in production
      # (startup fails if set) — they are non-production/operator smoke-test ids
      # only. Users without a connection fail closed instead of posting to an
      # operator account.
      - key: SOCIAL_PUBLISHER
        value: postpeer
      - key: POSTPEER_API_KEY
        sync: false
      - key: AUTH_PROVIDER
        value: firebase
      - key: FIREBASE_PROJECT_ID
        sync: false
      # --- Push notifications (publish results) ---
      # firebase-admin is installed. To go live: set FIREBASE_SERVICE_ACCOUNT_JSON
      # (below) to the service account key, THEN flip PUSH_SENDER to "firebase".
      # Flipping before the key is set crashes the API on startup.
      - key: PUSH_SENDER
        value: mock
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # Flip to true only after the service account is installed and a dedicated
      # account-deletion smoke test passes. The API fails closed while disabled.
      - key: FIREBASE_AUTH_DELETE_ENABLED
        value: "false"
      - key: BILLING_PROVIDER
        value: revenuecat
      - key: REVENUECAT_WEBHOOK_AUTH_TOKEN
        sync: false
      - key: GOOGLE_PLAY_NOTIFICATION_AUTH_TOKEN
        sync: false
      - key: REVENUECAT_STARTER_ENTITLEMENT_ID
        value: starter
      - key: REVENUECAT_PRO_ENTITLEMENT_ID
        value: pro
      - key: REVENUECAT_STARTER_PRODUCT_ID
        value: postdee_starter_monthly
      - key: REVENUECAT_PRO_PRODUCT_ID
        value: postdee_pro_monthly

databases:
  - name: postdee-postgres
    region: singapore
    databaseName: postdee
    user: postdee
